{% extends "admin/base_site.html" %}
{% load static %}

{% block extrahead %}
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ===== GLOBAL ===== */
body {
    background: #11141a !important;
    color: #e5e7eb !important;
}

/* ===== CONTAINER ===== */
.dashboard-wrapper {
    padding: 30px;
}

/* ===== GRID ===== */
.top-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
}

/* ===== KPI CARD ===== */
.kpi-card {
    background: #4b5872;
    padding: 25px;
    border-radius: 16px;
    border: 1px solid #1f2937;
    transition: 0.3s ease;
}

.kpi-card:hover {
    transform: translateY(-5px);
    border-color: #6366f1;
}

.kpi-title {
    font-size: 13px;
    opacity: 0.7;
}

.kpi-value {
    font-size: 30px;
    font-weight: 600;
    margin-top: 10px;
}

/* ===== MAIN GRID ===== */
.main-grid {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 25px;
}

/* ===== CHART CARD ===== */
.chart-card {
    background: #4b5872;;
    padding: 30px;
    border-radius: 16px;
    border: 1px solid #1f2937;
}

/* ===== ACTIVITY CARD ===== */
.activity-card {
    background: #4b5872;
    padding: 20px;
    border-radius: 16px;
    border: 1px solid #1f2937;
}

.activity-item {
    padding: 12px 0;
    border-bottom: 1px solid #536886;
    font-size: 14px;
}

/* ===== RESPONSIVE ===== */
@media(max-width: 900px){
    .main-grid {
        grid-template-columns: 1fr;
    }
}

</style>
{% endblock %}

{% block content %}

<div class="dashboard-wrapper">

    <!-- KPI SECTION -->
    <div class="top-grid">
        <div class="kpi-card">
            <div class="kpi-title">Total Projects</div>
            <div class="kpi-value" id="projects">0</div>
        </div>

        <div class="kpi-card">
            <div class="kpi-title">Total Tasks</div>
            <div class="kpi-value" id="tasks">0</div>
        </div>

        <div class="kpi-card">
            <div class="kpi-title">Completed</div>
            <div class="kpi-value" id="done">0</div>
        </div>

        <div class="kpi-card">
            <div class="kpi-title">Completion Rate</div>
            <div class="kpi-value" id="rate">0%</div>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-grid">

        <!-- CHART -->
        <div class="chart-card">
            <h3 style="margin-bottom:20px;">📈 Monthly Performance</h3>
            <canvas id="performanceChart"></canvas>
        </div>

        <!-- ACTIVITY -->
        <div class="activity-card">
            <h3 style="margin-bottom:15px;">🕒 Recent Activity</h3>
            <div id="activity-list"></div>
        </div>

    </div>

</div>

<script>
const socket = new WebSocket(
    "ws://" + window.location.host + "/ws/admin-dashboard/"
);

socket.onmessage = function(e) {
    const data = JSON.parse(e.data);

    document.getElementById("projects").innerText = data.projects;
    document.getElementById("tasks").innerText = data.tasks;
    document.getElementById("done").innerText = data.done;

    let rate = 0;
    if(data.tasks > 0){
        rate = Math.round((data.done / data.tasks) * 100);
    }

    document.getElementById("rate").innerText = rate + "%";
};
</script>
{% endblock %}
